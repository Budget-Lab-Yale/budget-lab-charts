notes: "The first row reports the results published on April 8, 2026, for the scenario where Section 122 tariffs are allowed to expire. The second row fixes the baseline MFN tariff rate; the third updates our estimates of tariff rates, reflecting improved estimation of baseline, Section 232, and Section 301 tariffs. The fourth row adds the model updates — namely, the inclusion of the new η-parameters — so the pre-substitution columns fall as the ηs now apply upstream (the statutory ETR column is unchanged, since the ηs change what is collected, not what is announced)."
