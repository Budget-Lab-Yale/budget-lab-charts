title: "Calibrated etas by trading partner and product"
subtitle: "Higher eta = larger share of the statutory tariff avoided (exemption/preference take-up, de minimis, mismeasurement) - realized rate further below statutory. Negative = realized rate above statutory."
source: "The Budget Lab Tariff Model."
note: "Bars are simple averages across the other dimension. Applied as realized ETR = statutory ETR x (1 - eta). Amber bars: realized rate above statutory. The reference line is the model's import-weighted aggregate eta."
