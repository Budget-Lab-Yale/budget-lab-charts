name: CI

# PAUSED (manual-only) until the engine repo is public. While it's private, the Actions
# runner can't `npm ci` the cross-repo git dependency (git exit 128), so every push fails.
# When both repos are public: uncomment the push/PR triggers and `gh workflow enable CI`.
on:
  workflow_dispatch:
  # push:
  #   branches: ["**"]
  # pull_request:
  #   branches: ["**"]

# Serialize Pages deploys; don't cancel an in-flight one.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Deterministic, cross-platform pipeline ────────────────────────────────
  # validate + build + catalog run on every push/PR. No Playwright required.
  build:
    name: Validate / Build / Catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true       # pull LFS objects (baselines) so they're available if needed

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # NOTE: the engine is a cross-repo git dependency. Both repos are slated to go public,
      # at which point `npm ci` clones the engine with no auth. While the engine repo is
      # still private, this step fails (git exit 128) — that's expected and accepted for now.
      - name: Install dependencies
        run: npm ci

      - name: Validate all charts
        run: npm run validate

      - name: Build all charts
        run: npm run build

      - name: Build catalog
        run: npm run catalog

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Advisory: visual snapshot comparison ─────────────────────────────────
  # This job compares rendered PNGs against committed baselines. It is ADVISORY
  # because baselines are platform-specific (font rendering / anti-aliasing
  # differ by OS). The committed baselines were generated on the developer's
  # machine and will not match until they are regenerated in this CI environment.
  #
  # To fix: run `npm run snapshot -- --update` in this environment, commit the
  # new baseline.png files (tracked via Git LFS), and push. After that one-time
  # re-seed, the snapshot gate becomes authoritative for this platform.
  #
  # Until then, failures here are expected and do NOT block merge.
  snapshot:
    name: Snapshot (advisory — platform-specific baselines)
    runs-on: ubuntu-latest
    continue-on-error: true   # advisory: does not block CI
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (including Playwright)
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run snapshot comparison
        run: npm run snapshot
        # NOTE: Expected to fail until baselines are regenerated in this environment.
        # See comment above.

  # ── Deploy to GitHub Pages ────────────────────────────────────────────────
  # Assembles _site/ (landing page + chart pages + catalog + baseline thumbnails)
  # and publishes it to GitHub Pages. Runs only on main.
  #
  # Prerequisite: repo Settings → Pages → "Build and deployment" → Source = "GitHub Actions".
  #
  # Like the rest of this workflow, it only fires on manual dispatch until the engine repo
  # is public (npm ci needs to clone the private cross-repo dependency). When both repos are
  # public, re-enable the push trigger above.
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true       # baseline.png thumbnails are stored in Git LFS

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build, catalog, assemble site
        run: |
          npm run build
          npm run catalog
          npm run site

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
