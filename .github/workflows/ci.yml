name: CI

# Builds the chart gallery and publishes it to GitHub Pages (the gh-pages branch): production at
# the branch root on push to main, and a live preview at /pr-preview/pr-<n>/ on each PR.
#
# The engine is a public git dependency. npm pins git deps as `git+ssh://` in the lockfile, which
# the runner has no key for — so each job rewrites GitHub SSH URLs to HTTPS before `npm ci`
# (no auth needed for a public repo).
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write        # push the built site to the gh-pages branch
  pull-requests: write   # comment the preview URL on the PR

# Serialize all writers of the gh-pages branch (preview + production) so pushes don't race.
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  # ── Merge gate ────────────────────────────────────────────────────────────
  # Spec/structure/data validation only — no rendering, no Chromium. Make this a required status
  # check in branch protection so a malformed chart.yaml can't merge.
  validate:
    name: Validate
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - name: Install (engine over HTTPS)
        run: |
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
          git config --global url."https://github.com/".insteadOf git@github.com:
          npm ci
      - run: npm run validate

  # ── Per-PR live preview ───────────────────────────────────────────────────
  # Builds + assembles the site and publishes it to gh-pages at /pr-preview/pr-<n>/, then comments
  # the URL on the PR. On PR close the same action removes that directory. Fork PRs get a read-only
  # token and are skipped by the action (no preview) — acceptable for an internal repo.
  preview:
    name: PR preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        if: github.event.action != 'closed'
        with:
          node-version: "20"
          cache: "npm"
      - name: Fetch prior gh-pages state
        if: github.event.action != 'closed'
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: .gh-pages
        continue-on-error: true   # first ever run has no gh-pages
      - name: Build site
        if: github.event.action != 'closed'
        env:
          GH_PAGES_DIR: ${{ github.workspace }}/.gh-pages
        run: |
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
          git config --global url."https://github.com/".insteadOf git@github.com:
          npm ci
          npx playwright install --with-deps chromium
          npm run build
          npm run catalog
          npm run site
          npm run thumbs
      - name: Publish build cache to gh-pages
        if: github.event.action != 'closed'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site/.build/thumbs
          destination_dir: .build/thumbs
          publish_branch: gh-pages
          keep_files: true
      - name: Deploy / remove preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./_site
          preview-branch: gh-pages
          umbrella-dir: pr-preview

  # ── Production deploy ─────────────────────────────────────────────────────
  # On merge to main: build + assemble + publish _site/ to the gh-pages root. keep_files:true so a
  # production deploy never wipes the pr-preview/ subtree. (Caveat: keep_files also means a removed
  # chart leaves stale files at the root — prune the gh-pages branch manually on the rare removal.)
  deploy:
    name: Deploy to GitHub Pages
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - name: Fetch prior gh-pages state
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: .gh-pages
        continue-on-error: true   # first ever run has no gh-pages
      - name: Build site
        env:
          GH_PAGES_DIR: ${{ github.workspace }}/.gh-pages
        run: |
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
          git config --global url."https://github.com/".insteadOf git@github.com:
          npm ci
          npx playwright install --with-deps chromium
          npm run build
          npm run catalog
          npm run site
          npm run thumbs
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          keep_files: true
      - name: Prune orphans
        run: |
          git -C .gh-pages fetch origin gh-pages
          git -C .gh-pages reset --hard origin/gh-pages
          prs=$(gh pr list --state open --json number -q '[.[].number]|join(",")') || { echo "gh pr list failed; skipping prune"; exit 0; }
          node scripts/prune.mjs --open-prs "$prs"
          if [ -n "$(git -C .gh-pages status --porcelain)" ]; then
            git -C .gh-pages config user.name "github-actions[bot]"
            git -C .gh-pages config user.email "github-actions[bot]@users.noreply.github.com"
            git -C .gh-pages add -A
            git -C .gh-pages commit -m "Prune orphaned charts and closed-PR previews"
            git -C .gh-pages push origin HEAD:gh-pages
          fi
        env:
          GH_PAGES_DIR: ${{ github.workspace }}/.gh-pages
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
