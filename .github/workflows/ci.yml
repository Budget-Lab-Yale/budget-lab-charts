name: CI

# PAUSED (manual-only) until prerequisites hold. While the engine repo is private, the Actions
# runner can't `npm ci` the cross-repo git dependency (git exit 128). To enable at launch:
#   1. Engine repo public (or CI auth added) so `npm ci` can clone it.
#   2. Engine pin in package.json at a release that builds these charts (>= 1.0.0).
#   3. Settings → Pages → "Deploy from a branch" → branch `gh-pages` / root.
#   4. Uncomment the push/pull_request triggers below and `gh workflow enable CI`.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:
  #   types: [opened, reopened, synchronize, closed]

permissions:
  contents: write        # push the built site to the gh-pages branch
  pull-requests: write   # comment the preview URL on the PR

# Serialize all writers of the gh-pages branch (preview + production) so pushes don't race.
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  # ── Merge gate ────────────────────────────────────────────────────────────
  # Spec/structure/data validation only — no rendering, no Chromium. Make this a required status
  # check in branch protection so a malformed chart.yaml can't merge.
  validate:
    name: Validate
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run validate

  # ── Per-PR live preview ───────────────────────────────────────────────────
  # Builds + assembles the site and publishes it to gh-pages at /pr-preview/pr-<n>/, then comments
  # the URL on the PR. On PR close the same action removes that directory. Fork PRs get a read-only
  # token and are skipped by the action (no preview) — acceptable for an internal repo.
  preview:
    name: PR preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: github.event.action != 'closed'
        with:
          node-version: "20"
          cache: "npm"
      - name: Build site
        if: github.event.action != 'closed'
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run build
          npm run catalog
          npm run site
          npm run thumbs
      - name: Deploy / remove preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./_site
          preview-branch: gh-pages
          umbrella-dir: pr-preview

  # ── Production deploy ─────────────────────────────────────────────────────
  # On merge to main: build + assemble + publish _site/ to the gh-pages root. keep_files:true so a
  # production deploy never wipes the pr-preview/ subtree. (Caveat: keep_files also means a removed
  # chart leaves stale files at the root — prune the gh-pages branch manually on the rare removal.)
  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Build site
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run build
          npm run catalog
          npm run site
          npm run thumbs
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          keep_files: true
